site_name: FeedBack User Guide
site_description: Public user guide and wiki for FeedBack
repo_url: https://github.com/got-feedback/feedback-user-guide
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
